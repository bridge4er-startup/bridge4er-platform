name: Vercel Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy backend (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_uWkF3VWdfxOpEfYGIDRCO9F1
          VERCEL_PROJECT_ID: prj_63g22JJo267grHRvshuSC5MXgSnu
        run: |
          vercel deploy --prod --yes --cwd backend --token "$VERCEL_TOKEN"

      - name: Deploy frontend (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_uWkF3VWdfxOpEfYGIDRCO9F1
          VERCEL_PROJECT_ID: prj_dWc9jBypWDzhRlcCXIdrBYlMuSt8
        run: |
          vercel deploy --prod --yes --cwd frontend --token "$VERCEL_TOKEN"
